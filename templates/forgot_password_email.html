<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { background-color: #ffffff; max-width: 600px; margin: 0 auto; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { color: #333333; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        p { color: #666666; font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 15px 30px; background-color: #198754; color: #ffffff !important; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 16px; }
        .footer { margin-top: 40px; border-top: 1px solid #eeeeee; padding-top: 20px; color: #999999; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Password Reset Request</h1>
        <p>You recently requested to reset your password for your Driver Safety account. Click the button below to safely create a new password:</p>
        
        <div style="text-align: center;">
            <a href="{{ reset_link }}" class="btn">Reset Password</a>
        </div>
        
        <div class="footer">
            <p>This link will safely expire in 1 hour.<br>
            If you didn't request a password reset, please ignore this email.</p>
        </div>
    </div>
</body>
</html>
